<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALMOST HOME | Jordan's Face .com</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1000;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,

    }

    header {

      padding: 15px 10px 5px;

    }

    .title a {
      color: inherit;
      text-decoration: none;
    }

    .title a:hover {
      text-shadow: 0 0 15px #cc66ff, 0 0 30px #9933cc, 0 0 45px #cc66ff;
    }

    .hud {

      width: 100%;

      cursor: pointer;

    .game-msg {
      font-size: 0.6rem;
      color: #33ff33;
      margin-top: 12px;
      text-align: center;
      line-height: 2;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }

    .controls-info {
      font-size: 0.45rem;

    @media (max-width: 600px) {

        padding: 5px;
      }
      header { padding: 8px 5px 2px; }
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <header>
    <h1 class="title"><a href="index.html">ALMOST HOME</a></h1>
  </header>

  <div class="hud">
    <div>
      <span class="score-label">SCORE:</span>

      <span class="score-label">PIECES:</span>

  <canvas id="gameCanvas"></canvas>
  <p class="game-msg" id="gameMsg">PRESS ENTER OR TAP TO START</p>
  <p class="controls-info">TAP TWO TILES TO SWAP THEM &mdash; REBUILD THE PLANET</p>

<script>
// ==========================================
//  ALMOST HOME
//  Reassemble the scrambled planet!
// ==========================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 504;
const H = 504;
canvas.width = W;
canvas.height = H;

// Load face image
const faceImg = new Image();
faceImg.src = 'images/jordan.jpeg';

// ---- Game Constants ----
const MAX_WAVES = 2;
const WAVE_1_TIME = 90;
const WAVE_2_TIME = 120;
const MAX_WRONG = 3; // not used for puzzle but keeping pattern

// ---- Game State ----
let gameState = 'waiting'; // waiting | playing | waveTransition | gameover | win | victoryCutscene
let score = 0;
let highScore = parseInt(localStorage.getItem('puzzle-high') || '0');
let lives = 3;
let wave = 1;
let frame = 0;
let shakeTimer = 0;
let waveTransitionTimer = 0;
const WAVE_TRANSITION_DURATION = 240;
let waveBonusAmount = 0;
let currentPilot = 'jordan';

// ---- Timer ----
let waveTimeRemaining = WAVE_1_TIME;
let lastTimestamp = 0;
let timerWarningPlayed = false;

// ---- Puzzle State ----
let gridCols = 4;
let gridRows = 4;
let tileW = W / 4;
let tileH = H / 4;
let solutionImage = null; // offscreen canvas with generated galaxy
let grid = []; // grid[displayPos] = solutionPos
let selectedTile = -1;
let correctCount = 0;
let totalTiles = 16;
let swapCount = 0;

// ---- Victory Cutscene ----
let cutsceneTimer = 0;
let cutsceneStars = [];
let cutscenePhase = 0;
let cutsceneRoute = [];

// ---- Stars background ----
const bgStars = [];
for (let i = 0; i < 80; i++) {
  bgStars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 0.5 + 0.2,
    brightness: Math.random(),
  });
}

// ==========================================
//  SEEDED RANDOM
// ==========================================
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// ==========================================
//  PROCEDURAL PLANET GENERATION
// ==========================================
function generatePlanet() {
  const seed = Date.now() + Math.floor(Math.random() * 100000);
  const rng = seededRandom(seed);

  const offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  const offCtx = offCanvas.getContext('2d');

  // 1. Dark space background
  offCtx.fillStyle = '#030318';
  offCtx.fillRect(0, 0, W, H);

  // 2. Background stars
  const starCount = 150 + Math.floor(rng() * 100);
  const tints = ['255,255,255', '200,220,255', '255,240,200', '180,200,255'];
  for (let i = 0; i < starCount; i++) {
    const x = rng() * W;
    const y = rng() * H;
    const size = 0.5 + rng() * 1.5;
    const brightness = 0.2 + rng() * 0.6;
    const tint = tints[Math.floor(rng() * tints.length)];
    offCtx.fillStyle = `rgba(${tint}, ${brightness})`;
    offCtx.beginPath();
    offCtx.arc(x, y, size / 2, 0, Math.PI * 2);
    offCtx.fill();
  }

  // 3. Planet — large, centered, with recognizable features
  const planetR = 160 + Math.floor(rng() * 40); // 160-200 radius
  const px = W / 2 + (rng() - 0.5) * 30;
  const py = H / 2 + (rng() - 0.5) * 30;

  // Planet color palettes (base, midtone, dark, highlight)
  const palettes = [
    { base: [60, 130, 200], mid: [40, 100, 170], dark: [20, 60, 120], hi: [100, 180, 240], name: 'ice' },
    { base: [180, 100, 50],  mid: [150, 75, 35],  dark: [100, 45, 20], hi: [220, 150, 90], name: 'desert' },
    { base: [50, 160, 80],   mid: [35, 120, 60],  dark: [20, 80, 40],  hi: [80, 200, 120], name: 'forest' },
    { base: [160, 80, 160],  mid: [120, 50, 130], dark: [80, 30, 90],  hi: [200, 130, 200], name: 'nebula' },
    { base: [200, 140, 60],  mid: [170, 110, 40], dark: [130, 80, 25], hi: [240, 190, 100], name: 'gas' },
    { base: [140, 60, 60],   mid: [110, 40, 40],  dark: [70, 25, 25],  hi: [190, 100, 90], name: 'mars' },
  ];
  const pal = palettes[Math.floor(rng() * palettes.length)];

  // Base planet circle with gradient
  const planetGrad = offCtx.createRadialGradient(
    px - planetR * 0.3, py - planetR * 0.3, planetR * 0.1,
    px, py, planetR
  );
  planetGrad.addColorStop(0, `rgb(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]})`);
  planetGrad.addColorStop(0.5, `rgb(${pal.base[0]}, ${pal.base[1]}, ${pal.base[2]})`);
  planetGrad.addColorStop(0.85, `rgb(${pal.mid[0]}, ${pal.mid[1]}, ${pal.mid[2]})`);
  planetGrad.addColorStop(1, `rgb(${pal.dark[0]}, ${pal.dark[1]}, ${pal.dark[2]})`);

  offCtx.save();
  offCtx.beginPath();
  offCtx.arc(px, py, planetR, 0, Math.PI * 2);
  offCtx.clip();

  offCtx.fillStyle = planetGrad;
  offCtx.fillRect(px - planetR, py - planetR, planetR * 2, planetR * 2);

  // Surface bands (horizontal stripes with slight waviness)
  const bandCount = 4 + Math.floor(rng() * 5);
  for (let b = 0; b < bandCount; b++) {
    const bandY = py - planetR + (b + 0.5) * (planetR * 2 / bandCount);
    const bandH = planetR * 2 / bandCount * (0.3 + rng() * 0.5);
    const bandAlpha = 0.08 + rng() * 0.15;
    const lighter = rng() > 0.5;

    offCtx.fillStyle = lighter
      ? `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, ${bandAlpha})`
      : `rgba(${pal.dark[0]}, ${pal.dark[1]}, ${pal.dark[2]}, ${bandAlpha})`;

    offCtx.beginPath();
    offCtx.moveTo(px - planetR - 10, bandY - bandH / 2);
    for (let x = px - planetR; x <= px + planetR; x += 15) {
      const wave = Math.sin((x + seed * 0.01) * 0.03) * 10 * rng();
      offCtx.lineTo(x, bandY - bandH / 2 + wave);
    }
    for (let x = px + planetR; x >= px - planetR; x -= 15) {
      const wave = Math.sin((x + seed * 0.02) * 0.04) * 8 * rng();
      offCtx.lineTo(x, bandY + bandH / 2 + wave);
    }
    offCtx.closePath();
    offCtx.fill();
  }

  // Surface features — craters or spots
  const featureCount = 5 + Math.floor(rng() * 10);
  for (let f = 0; f < featureCount; f++) {
    const angle = rng() * Math.PI * 2;
    const dist = rng() * planetR * 0.85;
    const fx = px + Math.cos(angle) * dist;
    const fy = py + Math.sin(angle) * dist;
    const fr = 8 + rng() * 25;
    const featureAlpha = 0.06 + rng() * 0.12;

    if (rng() > 0.5) {
      // Dark crater/spot
      const cGrad = offCtx.createRadialGradient(fx, fy, 0, fx, fy, fr);
      cGrad.addColorStop(0, `rgba(${pal.dark[0]}, ${pal.dark[1]}, ${pal.dark[2]}, ${featureAlpha + 0.05})`);
      cGrad.addColorStop(0.7, `rgba(${pal.dark[0]}, ${pal.dark[1]}, ${pal.dark[2]}, ${featureAlpha})`);
      cGrad.addColorStop(1, `rgba(${pal.dark[0]}, ${pal.dark[1]}, ${pal.dark[2]}, 0)`);
      offCtx.fillStyle = cGrad;
    } else {
      // Light spot
      const cGrad = offCtx.createRadialGradient(fx, fy, 0, fx, fy, fr);
      cGrad.addColorStop(0, `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, ${featureAlpha + 0.05})`);
      cGrad.addColorStop(0.7, `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, ${featureAlpha})`);
      cGrad.addColorStop(1, `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, 0)`);
      offCtx.fillStyle = cGrad;
    }
    offCtx.beginPath();
    offCtx.arc(fx, fy, fr, 0, Math.PI * 2);
    offCtx.fill();
  }

  // Shadow overlay — darkened limb on one side
  const shadowAngle = rng() * Math.PI * 0.6 + Math.PI * 0.2;
  const shadowX = px + Math.cos(shadowAngle) * planetR * 0.5;
  const shadowY = py + Math.sin(shadowAngle) * planetR * 0.5;
  const shadowGrad = offCtx.createRadialGradient(
    px - Math.cos(shadowAngle) * planetR * 0.6,
    py - Math.sin(shadowAngle) * planetR * 0.6,
    planetR * 0.2,
    shadowX, shadowY, planetR * 1.3
  );
  shadowGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  shadowGrad.addColorStop(0.6, 'rgba(0, 0, 0, 0.2)');
  shadowGrad.addColorStop(1, 'rgba(0, 0, 0, 0.6)');
  offCtx.fillStyle = shadowGrad;
  offCtx.fillRect(px - planetR, py - planetR, planetR * 2, planetR * 2);

  offCtx.restore(); // unclip

  // 4. Atmosphere glow
  const glowGrad = offCtx.createRadialGradient(px, py, planetR * 0.95, px, py, planetR * 1.15);
  glowGrad.addColorStop(0, `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, 0.25)`);
  glowGrad.addColorStop(0.5, `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, 0.08)`);
  glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  offCtx.fillStyle = glowGrad;
  offCtx.beginPath();
  offCtx.arc(px, py, planetR * 1.15, 0, Math.PI * 2);
  offCtx.fill();

  // 5. Optional ring (40% chance)
  if (rng() < 0.4) {
    offCtx.save();
    offCtx.translate(px, py);
    offCtx.scale(1, 0.3);
    const ringInner = planetR * 1.3;
    const ringOuter = planetR * 1.7;
    offCtx.strokeStyle = `rgba(${pal.hi[0]}, ${pal.hi[1]}, ${pal.hi[2]}, 0.25)`;
    offCtx.lineWidth = 2;
    for (let r = ringInner; r < ringOuter; r += 4) {
      offCtx.globalAlpha = 0.1 + rng() * 0.15;
      offCtx.beginPath();
      offCtx.arc(0, 0, r, 0, Math.PI * 2);
      offCtx.stroke();
    }
    offCtx.globalAlpha = 1;
    offCtx.restore();
  }

  // 6. Optional moon (50% chance)
  if (rng() < 0.5) {
    const moonAngle = rng() * Math.PI * 2;
    const moonDist = planetR * 1.5 + rng() * 80;
    const mx = px + Math.cos(moonAngle) * moonDist;
    const my = py + Math.sin(moonAngle) * moonDist;
    const moonR = 12 + rng() * 18;

    // Only draw if on canvas
    if (mx > -moonR && mx < W + moonR && my > -moonR && my < H + moonR) {
      const moonGrad = offCtx.createRadialGradient(
        mx - moonR * 0.3, my - moonR * 0.3, moonR * 0.1,
        mx, my, moonR
      );
      moonGrad.addColorStop(0, '#ddd');
      moonGrad.addColorStop(0.7, '#999');
      moonGrad.addColorStop(1, '#555');
      offCtx.fillStyle = moonGrad;
      offCtx.beginPath();
      offCtx.arc(mx, my, moonR, 0, Math.PI * 2);
      offCtx.fill();

      // Moon craters
      for (let c = 0; c < 3; c++) {
        const ca = rng() * Math.PI * 2;
        const cd = rng() * moonR * 0.6;
        const cr = 2 + rng() * 4;
        offCtx.fillStyle = `rgba(80, 80, 80, ${0.2 + rng() * 0.2})`;
        offCtx.beginPath();
        offCtx.arc(mx + Math.cos(ca) * cd, my + Math.sin(ca) * cd, cr, 0, Math.PI * 2);
        offCtx.fill();
      }
    }
  }

  // 7. Subtle grid hint lines
  for (let col = 1; col < gridCols; col++) {
    const x = col * tileW;
    offCtx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
    offCtx.lineWidth = 1;
    offCtx.beginPath();
    offCtx.moveTo(x, 0);
    offCtx.lineTo(x, H);
    offCtx.stroke();
  }
  for (let row = 1; row < gridRows; row++) {
    const y = row * tileH;
    offCtx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
    offCtx.lineWidth = 1;
    offCtx.beginPath();
    offCtx.moveTo(0, y);
    offCtx.lineTo(W, y);
    offCtx.stroke();
  }

  solutionImage = offCanvas;
}

// ==========================================
//  PUZZLE INIT & LOGIC
// ==========================================
function initPuzzle(cols, rows) {
  gridCols = cols;
  gridRows = rows;
  totalTiles = cols * rows;
  tileW = Math.floor(W / cols);
  tileH = Math.floor(H / rows);

  // Create grid: each index holds the solution position
  grid = [];
  for (let i = 0; i < totalTiles; i++) grid[i] = i;

  // Fisher-Yates shuffle
  for (let i = grid.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [grid[i], grid[j]] = [grid[j], grid[i]];
  }

  // Ensure puzzle isn't already solved
  while (checkSolved()) {
    [grid[0], grid[1]] = [grid[1], grid[0]];
  }

  correctCount = countCorrect();
  selectedTile = -1;
  swapCount = 0;
}

function countCorrect() {
  let count = 0;
  for (let i = 0; i < totalTiles; i++) {
    if (grid[i] === i) count++;
  }
  return count;
}

function checkSolved() {
  for (let i = 0; i < totalTiles; i++) {
    if (grid[i] !== i) return false;
  }
  return true;
}

function performSwap(posA, posB) {
  [grid[posA], grid[posB]] = [grid[posB], grid[posA]];
  swapCount++;

  const correctA = (grid[posA] === posA);
  const correctB = (grid[posB] === posB);

  if (correctA || correctB) {
    playCorrectPlaceSound();
    score += 100;
    if (correctA && correctB) score += 100;
  } else {
    playSwapSound();
  }

  correctCount = countCorrect();
  updateHUD();

  if (checkSolved()) {
    puzzleComplete();
  }
}

function puzzleComplete() {
  const timeBonus = Math.floor(waveTimeRemaining * 10);
  const minSwaps = totalTiles - 1;
  const efficiencyRatio = Math.max(0, 1 - (swapCount - minSwaps) / (totalTiles * 2));
  const efficiencyBonus = Math.floor(efficiencyRatio * 500);
  const totalBonus = timeBonus + efficiencyBonus;
  score += totalBonus;

  if (wave >= MAX_WAVES) {
    score += 1000;
    localStorage.setItem('level-5-complete', 'true');
    playWinSound();
    saveHighScore();
    updateHUD();
    document.getElementById('gameMsg').textContent = '';
    gameState = 'victoryCutscene';
    initCutscene();
  } else {
    waveBonusAmount = totalBonus + 500;
    score += 500;
    gameState = 'waveTransition';
    waveTransitionTimer = WAVE_TRANSITION_DURATION;
    playWaveCompleteSound();
    saveHighScore();
    updateHUD();
  }
}

// ==========================================
//  AUDIO
// ==========================================
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playTileSelectSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, t);
  gain.gain.setValueAtTime(0.04, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.08);
}

function playTileDeselectSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(500, t);
  gain.gain.setValueAtTime(0.03, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.06);
}

function playSwapSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.linearRampToValueAtTime(600, t + 0.08);
  gain.gain.setValueAtTime(0.05, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.12);
}

function playCorrectPlaceSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const notes = [523, 659, 784];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t + i * 0.08);
    gain.gain.setValueAtTime(0.05, t + i * 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.08);
    osc.stop(t + i * 0.08 + 0.25);
  });
}

function playWaveCompleteSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t + i * 0.12);
    gain.gain.setValueAtTime(0.06, t + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.12);
    osc.stop(t + i * 0.12 + 0.35);
  });
}

function playWinSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const notes = [523, 659, 784, 1047, 1319, 1568];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t + i * 0.1);
    gain.gain.setValueAtTime(0.06, t + i * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.1);
    osc.stop(t + i * 0.1 + 0.45);
  });
}

function playGameOverSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 1.5);
  gain.gain.setValueAtTime(0.1, t);
  gain.gain.linearRampToValueAtTime(0, t + 1.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 1.6);
}

function playLifeLostSound() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
  gain.gain.setValueAtTime(0.1, t);
  gain.gain.linearRampToValueAtTime(0, t + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.35);
}

function playTimerWarningBeep() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, t);
  gain.gain.setValueAtTime(0.04, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}

function playRadioBeep() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
  osc.frequency.exponentialRampToValueAtTime(600 + Math.random() * 200, t + 0.15);
  filter.type = 'bandpass';
  filter.frequency.value = 1200;
  filter.Q.value = 5;
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.18);
}

// ==========================================
//  INPUT
// ==========================================
function handleTileClick(canvasX, canvasY) {
  if (gameState !== 'playing') return;

  const col = Math.floor(canvasX / tileW);
  const row = Math.floor(canvasY / tileH);
  if (col < 0 || col >= gridCols || row < 0 || row >= gridRows) return;

  const clickedPos = row * gridCols + col;

  if (selectedTile === -1) {
    selectedTile = clickedPos;
    playTileSelectSound();
  } else if (selectedTile === clickedPos) {
    selectedTile = -1;
    playTileDeselectSound();
  } else {
    performSwap(selectedTile, clickedPos);
    selectedTile = -1;
  }
}

canvas.addEventListener('click', (e) => {
  if (gameState === 'waiting' || gameState === 'gameover' || gameState === 'win') {
    startGame();
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  handleTileClick(x, y);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'waiting' || gameState === 'gameover' || gameState === 'win') {
    startGame();
    return;
  }
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top) * scaleY;
  handleTileClick(x, y);
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    if (gameState === 'waiting' || gameState === 'gameover' || gameState === 'win') {
      startGame();
    }
  }
});

// ==========================================
//  INIT
// ==========================================
function startGame() {
  ensureAudio();
  score = 0;
  lives = 3;
  wave = 1;
  currentPilot = 'jordan';
  lastTimestamp = 0;
  timerWarningPlayed = false;

  generatePlanet();
  initPuzzle(4, 4);
  waveTimeRemaining = WAVE_1_TIME;

  gameState = 'playing';
  document.getElementById('gameMsg').textContent = '';
  updateHUD();
}

function nextWave() {
  wave++;
  currentPilot = 'chai';
  timerWarningPlayed = false;
  lastTimestamp = 0;

  generatePlanet();
  initPuzzle(5, 5);
  waveTimeRemaining = WAVE_2_TIME;

  updateHUD();
}

// ==========================================
//  HUD
// ==========================================
function updateHUD() {
  document.getElementById('score').textContent = score;
  const pilotName = currentPilot === 'jordan' ? 'JORDAN' : 'CHAI';
  document.getElementById('wave').textContent = pilotName + ' ' + wave + '/' + MAX_WAVES;
  document.getElementById('highScoreDisplay').textContent = highScore;
  document.getElementById('timeDisplay').textContent = Math.ceil(waveTimeRemaining);
  document.getElementById('piecesDisplay').textContent = correctCount + '/' + totalTiles;
  let iconsHtml = '';
  for (let i = 0; i < lives; i++) {
    if (currentPilot === 'chai') {
      iconsHtml += '<span class="life-icon" style="background:#222;display:inline-flex;align-items:center;justify-content:center;font-size:14px;">&#128049;</span> ';
    } else {
      iconsHtml += '<span class="life-icon"><img src="images/jordan.jpeg" alt="life"></span> ';
    }
  }
  document.getElementById('livesIcons').innerHTML = iconsHtml;
}

// ==========================================
//  TIMER
// ==========================================
function updateTimer(dt) {
  if (gameState !== 'playing') return;

  waveTimeRemaining -= dt;

  if (waveTimeRemaining <= 10 && waveTimeRemaining > 0) {
    if (frame % 30 === 0) {
      playTimerWarningBeep();
    }
    timerWarningPlayed = true;
  }

  if (waveTimeRemaining <= 0) {
    waveTimeRemaining = 0;
    if (checkSolved()) {
      puzzleComplete();
    } else {
      lives--;
      updateHUD();
      if (lives <= 0) {
        gameState = 'gameover';
        playGameOverSound();
        saveHighScore();
        document.getElementById('gameMsg').innerHTML = 'GAME OVER<br>PRESS ENTER TO TRY AGAIN';
      } else {
        playLifeLostSound();
        shakeTimer = 15;
        generatePlanet();
        initPuzzle(gridCols, gridRows);
        waveTimeRemaining = wave === 1 ? WAVE_1_TIME : WAVE_2_TIME;
        timerWarningPlayed = false;
        lastTimestamp = 0;
      }
    }
  }

  updateHUD();
}

function saveHighScore() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('puzzle-high', highScore);
    updateHUD();
  }
}

    s.brightness += (Math.random() - 0.5) * 0.1;

    ctx.fillStyle = `rgba(255,255,255,${s.brightness * 0.5})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

function drawTimerBar() {
  const maxTime = wave === 1 ? WAVE_1_TIME : WAVE_2_TIME;
  const pct = Math.max(0, waveTimeRemaining / maxTime);
  const barW = W - 20;
  const barH = 4;
  const x = 10;
  const y = H - 8;

  ctx.fillStyle = '#111';
  ctx.fillRect(x, y, barW, barH);

  let r, g;
  if (pct > 0.5) {
    r = Math.floor((1 - pct) * 2 * 255);
    g = 255;
  } else {
    r = 255;
    g = Math.floor(pct * 2 * 255);
  }
  const flash = (waveTimeRemaining <= 10 && Math.floor(frame / 8) % 2 === 0);
  ctx.fillStyle = flash ? '#ff0000' : `rgb(${r},${g},0)`;
  ctx.fillRect(x, y, barW * pct, barH);
}

function drawPuzzle() {
  if (!solutionImage) return;

  for (let displayPos = 0; displayPos < totalTiles; displayPos++) {
    const solnPos = grid[displayPos];

    // Source region from solution image
    const srcCol = solnPos % gridCols;
    const srcRow = Math.floor(solnPos / gridCols);
    const sx = srcCol * tileW;
    const sy = srcRow * tileH;

    // Destination on canvas
    const dstCol = displayPos % gridCols;
    const dstRow = Math.floor(displayPos / gridCols);
    const dx = dstCol * tileW;
    const dy = dstRow * tileH;

    // Draw the tile image
    ctx.drawImage(solutionImage, sx, sy, tileW, tileH, dx, dy, tileW, tileH);

    // Tile border
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(dx, dy, tileW, tileH);

    // Edge piece highlights — bright cyan on sides that belong on the puzzle border
    const solnRow = Math.floor(solnPos / gridCols);
    const solnCol = solnPos % gridCols;
    const isTop = solnRow === 0;
    const isBottom = solnRow === gridRows - 1;
    const isLeft = solnCol === 0;
    const isRight = solnCol === gridCols - 1;

    if (isTop || isBottom || isLeft || isRight) {
      ctx.strokeStyle = 'rgba(0, 200, 255, 0.6)';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#00c8ff';
      ctx.shadowBlur = 6;
      if (isTop) {
        ctx.beginPath(); ctx.moveTo(dx + 1, dy + 1); ctx.lineTo(dx + tileW - 1, dy + 1); ctx.stroke();
      }
      if (isBottom) {
        ctx.beginPath(); ctx.moveTo(dx + 1, dy + tileH - 1); ctx.lineTo(dx + tileW - 1, dy + tileH - 1); ctx.stroke();
      }
      if (isLeft) {
        ctx.beginPath(); ctx.moveTo(dx + 1, dy + 1); ctx.lineTo(dx + 1, dy + tileH - 1); ctx.stroke();
      }
      if (isRight) {
        ctx.beginPath(); ctx.moveTo(dx + tileW - 1, dy + 1); ctx.lineTo(dx + tileW - 1, dy + tileH - 1); ctx.stroke();
      }
      ctx.shadowBlur = 0;
    }

    // Correct placement glow
    if (solnPos === displayPos) {
      ctx.strokeStyle = 'rgba(51, 255, 51, 0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(dx + 1, dy + 1, tileW - 2, tileH - 2);
    }

    // Selected tile highlight (pulsing yellow border)
    if (displayPos === selectedTile) {
      const pulse = 0.6 + Math.sin(frame * 0.15) * 0.4;
      ctx.strokeStyle = `rgba(255, 255, 0, ${pulse})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff0';
      ctx.shadowBlur = 10;
      ctx.strokeRect(dx + 1, dy + 1, tileW - 2, tileH - 2);
      ctx.shadowBlur = 0;
    }
  }
}

// ==========================================
//  VICTORY CUTSCENE
// ==========================================
function initCutscene() {
  cutsceneTimer = 0;
  cutscenePhase = 0;
  cutsceneStars = [];
  for (let i = 0; i < 80; i++) {
    cutsceneStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: 0.5 + Math.random() * 2,
    });
  }
  // Route waypoints
  cutsceneRoute = [];
  const steps = 8;
  for (let i = 0; i <= steps; i++) {
    cutsceneRoute.push({
      x: (i / steps) * W * 0.8 + W * 0.1,
      y: H * 0.85 - (i / steps) * H * 0.7 + (Math.random() - 0.5) * 40,
    });
  }
}

function updateCutscene() {
  cutsceneTimer++;

  if (cutsceneTimer < 180) cutscenePhase = 0;
  else if (cutsceneTimer < 360) cutscenePhase = 1;
  else cutscenePhase = 2;

  if (cutscenePhase === 2) {
    const t = cutsceneTimer - 360;
    if (t === 30 || t === 50 || t === 70) playRadioBeep();
  }

  if (cutsceneTimer >= 600) {
    window.location.href = 'index.html';
  }
}

function drawCutscene() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Stars
  cutsceneStars.forEach(s => {
    const speedMult = cutscenePhase === 2 ? 2 : 0.3;
    s.y += s.speed * speedMult;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.4})`;
    if (cutscenePhase === 2) {
      // Streak effect
      ctx.fillRect(s.x, s.y, s.size * 0.5, s.size + s.speed * 3);
    } else {
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
  });

  // Draw solution galaxy in background
  if (solutionImage) {
    ctx.globalAlpha = cutscenePhase === 2 ? Math.max(0, 0.4 - (cutsceneTimer - 360) / 600) : 0.4;
    ctx.drawImage(solutionImage, 0, 0);
    ctx.globalAlpha = 1;
  }

  // Pod
  if (cutscenePhase < 2) {
    const podX = W / 2;
    const podY = H / 2 + 50;

    ctx.save();
    ctx.translate(podX, podY);

    // Engine glow
    ctx.fillStyle = 'rgba(204, 102, 255, 0.1)';
    ctx.beginPath();
    ctx.ellipse(0, 15, 20, 8 + Math.random() * 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#667';
    ctx.beginPath();
    ctx.ellipse(0, 0, 38, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#99a';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Window
    ctx.fillStyle = '#224';
    ctx.beginPath();
    ctx.arc(-5, -3, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#88a';
    ctx.stroke();

    // Face in window
    if (faceImg.complete) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(-5, -3, 10, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(faceImg, -15, -13, 20, 20);
      ctx.restore();
    }

    // Chai on top
    ctx.fillStyle = '#ddb';
    ctx.beginPath();
    ctx.arc(12, -20, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath(); ctx.moveTo(7, -26); ctx.lineTo(9, -30); ctx.lineTo(12, -26); ctx.fill();
    ctx.beginPath(); ctx.moveTo(12, -26); ctx.lineTo(15, -30); ctx.lineTo(17, -26); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(10, -21, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f33';
    ctx.beginPath(); ctx.arc(14, -21, 1.5, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  // Text
  ctx.textAlign = 'center';

  if (cutscenePhase === 0) {
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 12;
    ctx.fillText('PLANET REBUILT!', W / 2, 60);
    ctx.shadowBlur = 0;

    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = '#33ff33';
    ctx.fillText('THE PLANET IS WHOLE AGAIN...', W / 2, 90);
  } else if (cutscenePhase === 1) {
    // Draw route line
    const progress = Math.min(1, (cutsceneTimer - 180) / 120);
    const pointsToShow = Math.floor(progress * cutsceneRoute.length);

    if (pointsToShow >= 2) {
      ctx.strokeStyle = '#ffa500';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ffa500';
      ctx.shadowBlur = 8;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(cutsceneRoute[0].x, cutsceneRoute[0].y);
      for (let i = 1; i < pointsToShow; i++) {
        ctx.lineTo(cutsceneRoute[i].x, cutsceneRoute[i].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      // Pulsing dot at route tip
      const tipPoint = cutsceneRoute[pointsToShow - 1];
      const dotPulse = 0.7 + Math.sin(frame * 0.2) * 0.3;
      ctx.fillStyle = `rgba(255, 165, 0, ${dotPulse})`;
      ctx.beginPath();
      ctx.arc(tipPoint.x, tipPoint.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = '#66ddff';
    ctx.shadowColor = '#66ddff';
    ctx.shadowBlur = 10;
    ctx.fillText('COURSE PLOTTED', W / 2, 55);
    ctx.shadowBlur = 0;

    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('THE WAY HOME IS CLEAR', W / 2, 80);
  } else {
    const t = cutsceneTimer - 360;
    const alpha = Math.min(1, t / 30);

    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = `rgba(255, 170, 0, ${alpha})`;
    ctx.shadowColor = '#ffa500';
    ctx.shadowBlur = 12 * alpha;
    ctx.fillText('ALMOST HOME...', W / 2, 55);
    ctx.shadowBlur = 0;

    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = `rgba(204, 102, 255, ${alpha})`;
    ctx.fillText('NEXT STOP: A NEW FAMILY', W / 2, 82);
  }

  ctx.textAlign = 'left';
  ctx.shadowBlur = 0;
}

// ==========================================
//  MAIN GAME LOOP
// ==========================================
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  frame++;

  // Victory cutscene takes over
  if (gameState === 'victoryCutscene') {
    updateCutscene();
    drawCutscene();
    return;
  }

  // Delta time for timer
  if (lastTimestamp === 0) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
  lastTimestamp = timestamp;

  // Update
  if (gameState === 'playing') {
    updateTimer(dt);
  }

  if (gameState === 'waveTransition') {
    waveTransitionTimer--;
    if (waveTransitionTimer <= 0) {
      nextWave();
      gameState = 'playing';
    }
  }

  // Draw
  const shake = shakeTimer > 0 ? (Math.random() - 0.5) * 6 : 0;
  const shakeY = shakeTimer > 0 ? (Math.random() - 0.5) * 6 : 0;
  if (shakeTimer > 0) shakeTimer--;

  ctx.save();
  ctx.translate(shake, shakeY);

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'playing') {
    drawPuzzle();
    drawTimerBar();
  }

  if (gameState === 'waiting') {
    drawBgStars();
    drawWaitingOverlay();
  }
  if (gameState === 'waveTransition') {
    drawBgStars();
    drawWaveTransitionOverlay();
  }
  if (gameState === 'gameover') {
    drawBgStars();
    drawGameOverOverlay();
  }
  if (gameState === 'win') {
    drawBgStars();
  }

  ctx.restore();
}

// ==========================================
//  INIT
// ==========================================
updateHUD();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
